name: Hospital German Inline Bot

on:
  workflow_dispatch:
    inputs:
      run_type:
        description: "Message to send now"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - morning
          - evening

  schedule:
    # Summer time in Germany/Berlin:
    # 06:00 UTC = 08:00 Berlin
    # 16:00 UTC = 18:00 Berlin
    - cron: "0 6 * * *"
    - cron: "0 16 * * *"

permissions:
  contents: read

jobs:
  send-lesson:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # Manual run uses your selected input.
      # Scheduled run chooses morning/evening based on the cron time.
      RUN_TYPE: ${{ github.event_name == 'workflow_dispatch' && inputs.run_type || (github.event.schedule == '0 16 * * *' && 'evening' || 'morning') }}

    steps:
      - name: Check secrets
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "TELEGRAM_BOT_TOKEN is missing"
            exit 1
          fi

          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_CHAT_ID is missing"
            exit 1
          fi

          echo "Secrets exist"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Send hospital German lesson
        run: |
          python - <<'PY'
          import os
          import requests

          BOT_TOKEN = os.getenv("TELEGRAM_BOT_TOKEN", "").strip()
          CHAT_ID = os.getenv("TELEGRAM_CHAT_ID", "").strip()
          RUN_TYPE = os.getenv("RUN_TYPE", "test").strip().lower()

          if not BOT_TOKEN:
              raise RuntimeError("Missing TELEGRAM_BOT_TOKEN")

          if not CHAT_ID:
              raise RuntimeError("Missing TELEGRAM_CHAT_ID")

          if RUN_TYPE == "evening":
              message = """🌙🏥 Jonas' Krankenhausdeutsch-Korrektur
          ⏱️ Dauer: 5–7 Minuten

          Situation von heute:
          Ein neuer Patient kommt auf die Station und wirkt unsicher.

          Schritt 1:
          Höre deine heutige Sprachnachricht noch einmal an.

          Schritt 2:
          Verbessere 3 Sätze:
          • 1 Satz mit besserer Wortstellung
          • 1 Satz mit genauerer Grammatik
          • 1 Satz mit professionellerem Krankenhausdeutsch

          Schritt 3:
          Sprich die Situation noch einmal, aber kürzer und besser: 90 Sekunden.

          Pflicht-Wörter:
          • die Aufnahme
          • die Station
          • die Untersuchung
          • die Unterlagen

          Pflicht-Redemittel:
          • Guten Tag, mein Name ist ...
          • Ich erkläre Ihnen kurz, wie es weitergeht.
          • Haben Sie im Moment Schmerzen oder Fragen?

          Lehrer-Tipp:
          Im Krankenhaus muss Deutsch ruhig, höflich, kurz und eindeutig sein."""
          elif RUN_TYPE == "morning":
              message = """🏥🇩🇪 Jonas' Krankenhausdeutsch B2
          ⏱️ Dauer: 5 Minuten

          Situation:
          Ein neuer Patient kommt auf die Station und wirkt unsicher.

          Sprechfrage:
          Wie begrüßt du den Patienten freundlich und erklärst ihm die nächsten Schritte?

          Struktur:
          • Begrüßung
          • Kurz vorstellen
          • Ablauf erklären
          • Nach Schmerzen oder Fragen fragen

          Wortschatz:
          • die Aufnahme
          • die Station
          • die Untersuchung
          • die Unterlagen
          • sich anmelden
          • ruhig bleiben

          Redemittel:
          • Guten Tag, mein Name ist ...
          • Ich erkläre Ihnen kurz, wie es weitergeht.
          • Haben Sie im Moment Schmerzen oder Fragen?

          Aufgabe:
          Nimm eine Telegram-Sprachnachricht auf. Sprich 90 Sekunden ruhig und professionell."""
          else:
              message = """✅ Testnachricht vom Krankenhausdeutsch Bot

          Hallo Jonas, der Telegram-Bot funktioniert.

          Der Workflow läuft jetzt nur noch zweimal pro Tag:
          • morgens
          • abends

          Nächster Schritt:
          Starte mit einer kurzen B2-Aufgabe für Krankenhausdeutsch."""

          url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"

          response = requests.post(
              url,
              json={
                  "chat_id": CHAT_ID,
                  "text": message,
                  "disable_web_page_preview": True,
              },
              timeout=20,
          )

          if not response.ok:
              print("Telegram response:")
              print(response.text)

          if response.status_code == 401:
              raise RuntimeError("Telegram rejected TELEGRAM_BOT_TOKEN")

          if response.status_code == 400:
              raise RuntimeError("Telegram rejected TELEGRAM_CHAT_ID")

          if response.status_code == 403:
              raise RuntimeError("Telegram blocked the message. Open the bot in Telegram and send /start.")

          response.raise_for_status()
          print(f"Message sent successfully. RUN_TYPE={RUN_TYPE}")
          PY
